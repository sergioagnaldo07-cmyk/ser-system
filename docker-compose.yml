version: "3.9"

services:
  ser-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ser-backend
    restart: unless-stopped
    ports:
      - "3101:3101"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3101
      FRONTEND_PORT: 3100
      SER_DATA_DIR: /app/persist/data
      WHATSAPP_AUTH_PATH: /app/persist/whatsapp_auth
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    volumes:
      - ser_persist:/app/persist
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3101/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 40s

volumes:
  ser_persist:
